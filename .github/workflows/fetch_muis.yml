name: Fetch MUIS (SG)

on:
  schedule:
    - cron: '0 3 27 * *'
    - cron: '0 3 28 * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      MUIS_API_KEY: ${{ secrets.MUIS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch prayer times
        run: python3 scripts/fetch_muis.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prayer-times/SG/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fetch MUIS prayer times (automated)"
            git pull --rebase
            git push
          fi

      - name: Verify next month data
        run: python3 scripts/verify_data.py next-month SG
